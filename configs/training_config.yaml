# Quadruped RL Locomotion - Training Configuration

environment:
  xml_path: "mujoco_menagerie/unitree_go2/scene.xml"
  forward_reward_weight: 1.0
  ctrl_cost_weight: 0.05
  healthy_reward: 1.0
  healthy_z_range: [0.15, 0.6]
  reset_noise_scale: 0.1
  frame_skip: 20            # dt = 20 * 0.002 = 0.04s -> 25 Hz control
  max_episode_steps: 1000   # 40 seconds per episode

training:
  algorithm: "PPO"
  total_timesteps: 1_000_000
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  policy: "MlpPolicy"
  policy_kwargs:
    net_arch: [256, 256]

logging:
  log_dir: "logs/"
  model_dir: "models/"
  save_freq: 50000          # Save checkpoint every 50k steps
  eval_freq: 10000          # Evaluate every 10k steps
  n_eval_episodes: 5
  tensorboard_log: "logs/tensorboard/"
