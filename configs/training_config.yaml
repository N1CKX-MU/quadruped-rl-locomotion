# Quadruped RL Locomotion - Training Configuration

environment:
  xml_path: "mujoco_menagerie/unitree_go2/scene.xml"
  frame_skip: 20              # dt = 20 * 0.002 = 0.04s -> 25 Hz control
  cmd_vel: [0.5, 0.0, 0.0]   # Target velocity [vx, vy, yaw_rate]
  action_scale: 0.5           # Max joint position offset (rad) from default pose
  healthy_z_range: [0.15, 0.6]
  max_pitch_roll: 1.0         # Max pitch/roll before termination (rad)
  reset_noise_scale: 0.05
  max_episode_steps: 1000     # 1000 * 0.04s = 40 seconds per episode
  randomize_dynamics: false

training:
  algorithm: "PPO"
  total_timesteps: 5_000_000
  n_envs: 8                   # Parallel environments
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  policy: "MlpPolicy"
  policy_kwargs:
    net_arch: [256, 256]

curriculum:
  enabled: true
  start_vel: 0.3              # Starting target velocity (m/s)
  max_vel: 0.8                # Final target velocity (m/s)
  warmup_steps: 1_000_000     # Steps to reach max velocity

logging:
  log_dir: "logs/"
  model_dir: "models/"
  save_freq: 50000
  eval_freq: 25000
  n_eval_episodes: 10
  tensorboard_log: "logs/tensorboard/"
